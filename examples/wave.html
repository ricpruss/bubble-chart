<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Bubble Chart - Wave Example</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <script src="https://d3js.org/d3.v7.min.js"></script>
  <script src="../dist/bubble-chart.min.js"></script>
  <style>
    body { font-family: sans-serif; }
    #chart-container {
      width: 100%;
      max-width: 800px;
      margin: auto;
    }
  </style>
</head>
<body>

  <h1>🌊Wave Bubbles</h1>
  <div id="chart-container"></div>

  <script>
    const data = [
      { "label": "Oxygen", "size": 80, "count": 40 },
      { "label": "Nitrogen", "size": 50, "count": 40 },
      { "label": "Carbon", "size": 95, "count": 40 },
      { "label": "Hydrogen", "size": 30, "count": 15 },
      { "label": "Helium", "size": 70, "count": 10 }
    ];

    // 🚀 D3-Native: Create wave bubble chart and update with data
    const chart = BubbleChart.create("#chart-container")
      .withLabel("label")
      .withSize("size")
      .withColor("label")
      .withType("wave")                      // Fluid wave animations
      .withPercentage((d) => d.count / d.size)  // Wave fill calculation
      .build();
    
    // Update chart with data
    chart.update(data);
  </script>

</body>
</html>
